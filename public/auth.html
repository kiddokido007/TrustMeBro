<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMeBro | Secure Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-shield-alt logo-icon"></i>
            </div>
            <h1 class="auth-title">TrustMeBro</h1>
            <p class="auth-subtitle">Your safety matters to us</p>
        </div>

        <div class="role-badge" id="roleBadge">Rider Login</div>

        <form id="authForm">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-input" placeholder="Enter your email">
                    <i class="fas fa-envelope input-icon left-icon"></i>
                </div>
                <div id="emailError" class="error-message">Please enter a valid email address</div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="Enter your password">
                    <i class="fas fa-lock input-icon left-icon"></i>
                    <i class="fas fa-eye input-icon right-icon" id="togglePassword"></i>
                </div>
                <div id="passwordError" class="error-message">Password must be at least 6 characters</div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <input type="checkbox" id="rememberMe" name="rememberMe" style="width: auto; margin-right: 10px;">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-auth btn-auth-primary" id="submitBtn" disabled>
                Continue Securely
            </button>

            <div class="social-login-separator">
                <span>or continue with</span>
            </div>

            <div class="social-login-buttons">
                <button type="button" class="social-btn google-btn" id="googleLogin">
                    <i class="fab fa-google"></i> Google
                </button>
                <button type="button" class="social-btn facebook-btn" id="facebookLogin">
                    <i class="fab fa-facebook-f"></i> Facebook
                </button>
            </div>

            <a href="#" class="auth-link" id="switchModeLink">New here? Create account</a>

            <div id="adminLinkContainer"
                style="margin-top: 1rem; border-top: 1px solid #eee; padding-top: 1rem; display: none;">
                <a href="?role=rider" class="auth-link" style="font-size: 0.8rem; color: #64748b;">Not an admin? Back to
                    Rider Login</a>
            </div>

            <script>
                // Show/hide admin toggle based on URL
                const params = new URLSearchParams(window.location.search);
                if (params.get('role') === 'admin') {
                    document.getElementById('adminLinkContainer').style.display = 'block';
                    document.getElementById('roleBadge').style.background = 'var(--admin-primary, #0f172a)';
                }
            </script>
        </form>

        <div class="security-notes">
            <div class="security-note">
                <i class="fas fa-lock security-icon"></i>
                <span>Your data is encrypted</span>
            </div>
            <div class="security-note">
                <i class="fas fa-shield-alt security-icon"></i>
                <span>OTP required to start rides</span>
            </div>
        </div>
    </div>

    <script type="module" src="../scripts/auth.js"></script>
</body>

</html>
