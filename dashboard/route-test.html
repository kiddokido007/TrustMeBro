<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Test - TrustMeBro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .controls {
            padding: 15px;
            background: #002D62;
            color: white;
        }

        .controls h2 {
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #FF8C00;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #e67a00;
        }

        #map {
            flex: 1;
        }

        /* Hide routing instruction panel */
        .leaflet-routing-container {
            display: none !important;
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="controls">
        <h2>🗺️ Route Test - TrustMeBro</h2>
        <div class="input-group">
            <input type="text" id="pickup" placeholder="Pickup location (e.g., Chennai, India)" value="Chennai, India">
            <input type="text" id="drop" placeholder="Drop location (e.g., Bangalore, India)" value="Bangalore, India">
            <button onclick="drawRoute()">Draw Route</button>
        </div>
        <div class="status" id="status">Enter locations and click "Draw Route"</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([13.0827, 80.2750], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let routeControl = null;
        let pickupMarker = null;
        let dropMarker = null;

        // Geocode address using Nominatim
        async function geocode(address) {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
            const data = await response.json();
            if (data && data.length > 0) {
                return {
                    lat: parseFloat(data[0].lat),
                    lng: parseFloat(data[0].lon),
                    name: data[0].display_name
                };
            }
            return null;
        }

        // Draw route between two locations
        async function drawRoute() {
            const pickupInput = document.getElementById('pickup').value;
            const dropInput = document.getElementById('drop').value;
            const status = document.getElementById('status');

            if (!pickupInput || !dropInput) {
                status.textContent = '❌ Please enter both pickup and drop locations';
                return;
            }

            status.textContent = '⏳ Geocoding locations...';

            try {
                // Geocode both locations
                const pickup = await geocode(pickupInput);
                const drop = await geocode(dropInput);

                if (!pickup || !drop) {
                    status.textContent = '❌ Could not find one or both locations. Try being more specific.';
                    return;
                }

                status.textContent = '⏳ Drawing route...';

                // Remove previous markers
                if (pickupMarker) map.removeLayer(pickupMarker);
                if (dropMarker) map.removeLayer(dropMarker);

                // Add markers
                pickupMarker = L.marker([pickup.lat, pickup.lng], {
                    icon: L.divIcon({
                        html: '<div style="background: #002D62; color: white; padding: 10px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px;">📍</div>',
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    })
                }).addTo(map).bindPopup(`<b>Pickup:</b><br>${pickup.name}`);

                dropMarker = L.marker([drop.lat, drop.lng], {
                    icon: L.divIcon({
                        html: '<div style="background: #FF8C00; color: white; padding: 10px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px;">🏁</div>',
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    })
                }).addTo(map).bindPopup(`<b>Drop:</b><br>${drop.name}`);

                // Remove previous route
                if (routeControl) {
                    map.removeControl(routeControl);
                }

                // Create route
                routeControl = L.Routing.control({
                    waypoints: [
                        L.latLng(pickup.lat, pickup.lng),
                        L.latLng(drop.lat, drop.lng)
                    ],
                    routeWhileDragging: false,
                    show: false,
                    addWaypoints: false,
                    draggableWaypoints: false,
                    lineOptions: {
                        styles: [
                            { color: '#002D62', weight: 8, opacity: 0.6 },
                            { color: '#FF8C00', weight: 5, opacity: 1 }
                        ]
                    },
                    createMarker: () => null,
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://router.project-osrm.org/route/v1'
                    })
                }).addTo(map);

                // Hide instruction panel
                setTimeout(() => {
                    const container = document.querySelector('.leaflet-routing-container');
                    if (container) container.style.display = 'none';
                }, 100);

                // Handle route found
                routeControl.on('routesfound', function (e) {
                    const routes = e.routes;
                    if (routes && routes.length > 0) {
                        const distance = (routes[0].summary.totalDistance / 1000).toFixed(2);
                        const duration = (routes[0].summary.totalTime / 60).toFixed(0);
                        status.textContent = `✅ Route found! Distance: ${distance} km, Duration: ${duration} mins`;

                        // Fit map to show entire route
                        const bounds = L.latLngBounds([
                            [pickup.lat, pickup.lng],
                            [drop.lat, drop.lng]
                        ]);
                        map.fitBounds(bounds, { padding: [50, 50] });
                    }
                });

                // Handle routing errors
                routeControl.on('routingerror', function (e) {
                    console.error('Routing error:', e);
                    status.textContent = '❌ Could not find route. Try different locations.';
                });

            } catch (error) {
                console.error('Error:', error);
                status.textContent = '❌ Error: ' + error.message;
            }
        }

        // Allow Enter key to trigger route drawing
        document.getElementById('pickup').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') drawRoute();
        });
        document.getElementById('drop').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') drawRoute();
        });
    </script>
</body>

</html>
